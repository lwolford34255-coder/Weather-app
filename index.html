<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Weather App</title>

    <!-- Metadata To Use the App -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="apple-touch-startup-image" href="icon.png">
    <meta name="mobile-web-app-capable" content="yes">

    <!-- Libraries -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet" >
</head>
<body class="bg-dark">
    <div class="col-12 d-flex justify-content-center min-vh-100 align-items-center">
        <div class="card col-10 col-md-8 col-lg-6">
            <div class="card-body">
                <!-- Location -->
                <div class="d-flex align-items-center justify-content-center mb-3">
                    <i class="bi bi-cloud-sun text-secondary fs-1 me-2"></i>
                    <h1 class="mb-0">Cookville, TN</h1>
                </div>
                <hr>

                <!-- Basic Weather Stats -->
                <div class="d-flex align-items-center justify-content-center mb-3">
                    <h2>Current Weather</h2>
                </div>
                <div id="divWeatherStats" class="d-flex row align-items-center justify-content-center mb-3"></div>
                <hr>

                <!-- Chart That Shows Temp Throughout The Day-->
                <div class="d-flex align-items-center justify-content-center mb-3">
                    <h2>Temperature As Day Goes On</h2>
                </div>
                <div class="d-flex align-items-center justify-content-center mb-3">
                    <div style="width: 800px;">
                        <canvas id="canTempThoughoutDay"></canvas>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Footer giving credit to Open-Meteo -->
    <footer class="text-center">
            <p><a href="https://open-meteo.com/">Data From Open-Meteo</a></p>
    </footer>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-4.0.0.min.js" integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.5.0/chart.umd.min.js" integrity="sha512-Y51n9mtKTVBh3Jbx5pZSJNDDMyY+yGe77DGtBPzRlgsf/YLCh13kSZ3JmfHGzYFCmOndraf0sQgfM654b7dJ3w==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script>
        //Url for the API
        const strUrl = "https://api.open-meteo.com/v1/forecast?latitude=36.17&longitude=-85.5&hourly=temperature_2m,visibility,relative_humidity_2m,precipitation_probability,apparent_temperature,wind_speed_10m&current=is_day&timezone=America%2FChicago&wind_speed_unit=mph&temperature_unit=fahrenheit&precipitation_unit=inch"
        
        //fetching the url
        fetch(strUrl)
        //testing to make sure the Url is good
        .then(result => {
            if(result.ok){
                return result.json()
            } else {
                throw new Error('Bad URL')
            }
        })
        //retreiving the good data and using it to flesh out the app
        .then(data => {
            //Variables retreived from the URL
            const strTemp = data.hourly.temperature_2m[0];
            const strHumidity = data.hourly.relative_humidity_2m[0];
            const strPrecip = data.hourly.precipitation_probability[0];
            const strWind = data.hourly.wind_speed_10m[0];

            //Setup all of the variables inside a string that can be sent to the html to be displayed
            let strHTML = 
                `<div class="col-3 text-center">
                    <i class="bi bi-thermometer-half text-danger fs-2"></i>
                    <p>
                        Temperature: ${strTemp}°F
                    </p>
                </div>
                <div class="col-3 text-center">
                    <i class="bi bi-moisture text-primary fs-2"></i>
                    <p>
                        Humidity: ${strHumidity}%
                    </p>
                </div>
                <div class="col-3 text-center">
                    <i class="bi bi-droplet-fill text-primary fs-2"></i>
                    <p>
                        Rain Chance: ${strPrecip}%
                    </p>
                </div>
                <div class="col-3 text-center">
                    <i class="bi bi-wind text-warning fs-2"></i>
                    <p>
                        Wind: ${strWind} mph
                    </p>
                </div>`
            
            //Send data back to the div where it will be displayed
            document.querySelector("#divWeatherStats").innerHTML = strHTML

            //creating arrays for the chart to use
            const arrHourlyLabels = data.hourly.time.slice(0, 24);
            const arrHourlyTemps = data.hourly.temperature_2m.slice(0, 24);

            //creating a chart and printing it back to the canvas tag
            new Chart(document.getElementById('canTempThoughoutDay'), {
                    type: 'bar',
                    options: {
                        backgroundColor: "rgba(13, 110, 253, 0.5)",
                        animation: false,
                        plugins: {
                            legend: { display: false },
                            tooltip: { enabled: false }
                        }
                    },
                    data: {
                        /*
                        I had to lookup how to remove the first half of the time string because it looked ugly, so I looked it up and found split()
                        on W3Schools, It isn't generative AI, but I figured it couldn't hurt to mention where I found it as I don't think we have covered
                        this in class.
                        */
                        labels: arrHourlyLabels.map(strTime => strTime.split('T')[1]), 
                        datasets: [
                            {
                                label: 'Temperature Throughout Day',
                                data: arrHourlyTemps.map(strTemp => strTemp)
                            }
                        ]
                    }
                }
            )
        })
    </script>
</body>
</html>
